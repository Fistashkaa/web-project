<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація користувача</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>Створити обл&#1110;ковий запис</h1>
    <p class="subtitle">Заповніть форму нижче, щоб зареєструватися</p>
  </header>

  <main class="form-wrapper">
    <form id="registrationForm" class="registration-form" novalidate>

      <div class="form-group">
        <label for="firstName">Ім'я</label>
        <input type="text" id="firstName" name="firstName" placeholder="Введіть ваше ім'я">
        <span class="error-message" id="firstNameError"></span>
      </div>

      <div class="form-group">
        <label for="lastName">Прізвище</label>
        <input type="text" id="lastName" name="lastName" placeholder="Введіть ваше прізвище">
        <span class="error-message" id="lastNameError"></span>
      </div>

      <div class="form-group">
        <label for="email">Електронна пошта</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com">
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Мінімум 6 символів">
        <span class="error-message" id="passwordError"></span>
      </div>

      <button type="submit" class="submit-btn">Відправити</button>

      <p class="form-success" id="formSuccess"></p>

    </form>
  </main>

  

  <script src="script.js"></script>
</body>
</html>
